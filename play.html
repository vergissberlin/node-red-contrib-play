<script type="text/javascript">
var playaPreviewObjectUrl = null;
RED.nodes.registerType('playa', {
	category: 'output',
	color: '#FF0000',
	defaults: {
		name: {value: ''},
		player: {value: ''},
		soundPath: {value: ''},
		stopPrevious: {value: true},
		sendOnEnd: {value: false}
	},
	inputs: 1,
	outputs: 1,
	align: 'right',
	icon: 'bridge-dash.png',
	label: function () {
		return this.name || this._('playa.label.node');
	},
	paletteLabel: function () {
		return this._('playa.paletteLabel');
	},
	oneditprepare: function () {
		var that = this;
		var fileInput = $('#node-input-playa-file');
		var uploadBtn = $('#node-input-playa-upload-btn');
		var uploadStatus = $('#node-input-playa-upload-status');
		var nameInput = $('#node-input-name');
		var soundPathInput = $('#node-input-soundPath');
		var previewAudio = document.getElementById('node-input-playa-preview-audio');
		var previewError = $('#node-input-playa-preview-error');
		var base = RED.httpAdminRoot || '';
		if (base.slice(-1) !== '/') {
			base += '/';
		}

		var playerSelect = $('#node-input-player');
		var savedPlayer = (typeof this.player !== 'undefined' && this.player != null) ? String(this.player) : '';

		function populatePlayerSelect(players) {
			playerSelect.empty();
			playerSelect.append($('<option></option>').attr('value', '').text(that._('playa.label.playerAuto')));
			var hasSaved = false;
			(players || []).forEach(function (p) {
				if (p === savedPlayer) {
					hasSaved = true;
				}
				playerSelect.append($('<option></option>').attr('value', p).text(p));
			});
			if (savedPlayer && !hasSaved) {
				playerSelect.append($('<option></option>').attr('value', savedPlayer).text(savedPlayer));
			}
			playerSelect.val(savedPlayer);
		}

		fetch(base + 'contrib-playa/players', {credentials: 'include'})
			.then(function (res) {
				if (!res.ok) {
					throw new Error('players');
				}
				return res.json();
			})
			.then(function (data) {
				if (!data || !Array.isArray(data.players)) {
					throw new Error('players');
				}
				populatePlayerSelect(data.players);
			})
			.catch(function () {
				RED.notify(that._('playa.notify.playersLoadFallback'), 'warning');
				populatePlayerSelect(['mplayer', 'mpg123', 'play', 'afplay', 'aplay']);
			});

		function revokePreviewUrl() {
			if (playaPreviewObjectUrl) {
				URL.revokeObjectURL(playaPreviewObjectUrl);
				playaPreviewObjectUrl = null;
			}
			if (previewAudio) {
				previewAudio.removeAttribute('src');
				previewAudio.load();
			}
		}

		function showPreviewError(i18nKey) {
			previewError.text(that._(i18nKey)).show();
		}

		function clearPreviewError() {
			previewError.hide().empty();
		}

		var debounceTimer = null;
		function refreshPreview() {
			clearTimeout(debounceTimer);
			debounceTimer = setTimeout(function () {
				var p = (soundPathInput.val() || '').trim();
				revokePreviewUrl();
				clearPreviewError();
				if (!p) {
					return;
				}
				var url = base + 'contrib-playa/preview?path=' + encodeURIComponent(p);
				fetch(url, {credentials: 'include'})
					.then(function (res) {
						if (res.ok) {
							return res.blob();
						}
						var err = new Error('preview failed');
						err.status = res.status;
						throw err;
					})
					.then(function (blob) {
						playaPreviewObjectUrl = URL.createObjectURL(blob);
						previewAudio.src = playaPreviewObjectUrl;
						clearPreviewError();
					})
					.catch(function (err) {
						var status = err && err.status;
						if (status === 404) {
							showPreviewError('playa.preview.errorNotFound');
						} else if (status === 403) {
							showPreviewError('playa.preview.errorForbidden');
						} else if (status === 400) {
							showPreviewError('playa.preview.errorBadRequest');
						} else {
							showPreviewError('playa.preview.errorGeneric');
						}
					});
			}, 250);
		}

		function setUploadStatus(state, detail) {
			uploadBtn.prop('disabled', state === 'uploading');
			uploadStatus.removeClass('playa-upload-ok playa-upload-err');
			uploadStatus.css({ color: '', display: '' });
			if (state === 'idle') {
				uploadStatus.text('').hide();
				return;
			}
			uploadStatus.show();
			if (state === 'uploading') {
				uploadStatus.css('color', '#888').text(that._('playa.upload.uploading'));
			} else if (state === 'ok') {
				uploadStatus.addClass('playa-upload-ok').css('color', '#2e7d32');
				var line = that._('playa.upload.success');
				if (detail) {
					line += ' ' + detail;
				}
				uploadStatus.text(line);
			} else {
				uploadStatus.addClass('playa-upload-err').css('color', '#AD1625');
				uploadStatus.text(that._('playa.upload.failed') + ' ' + (detail || ''));
			}
		}

		setUploadStatus('idle');

		function syncFieldTitles() {
			var sp = (soundPathInput.val() || '').trim();
			soundPathInput.attr('title', sp);
			var nm = (nameInput.val() || '').trim();
			nameInput.attr('title', nm);
		}

		soundPathInput.on('input change', function () {
			syncFieldTitles();
			refreshPreview();
		});
		nameInput.on('input change', syncFieldTitles);
		syncFieldTitles();

		uploadBtn.on('click', function (ev) {
			ev.preventDefault();
			fileInput.trigger('click');
		});

		if (previewAudio) {
			previewAudio.addEventListener('error', function () {
				if (previewAudio.src) {
					showPreviewError('playa.preview.errorGeneric');
				}
			});
		}

		fileInput.on('change', function (e) {
			var file = e.target.files && e.target.files[0];
			if (!file) {
				return;
			}
			setUploadStatus('uploading');
			var formData = new FormData();
			formData.append('file', file);
			var headers = { Accept: 'application/json' };
			if (RED.settings && RED.settings.csrfToken) {
				headers['X-CSRF-Token'] = RED.settings.csrfToken;
			}
			fetch(base + 'contrib-playa/upload', {
				method: 'POST',
				body: formData,
				credentials: 'include',
				headers: headers
			})
				.then(function (res) {
					return res.text().then(function (text) {
						var data = {};
						if (text) {
							try {
								data = JSON.parse(text);
							} catch (parseErr) {
								data = { error: text.slice(0, 300) || res.statusText };
							}
						}
						if (!res.ok) {
							throw new Error((data && data.error) || res.statusText || 'Upload failed');
						}
						return data;
					});
				})
				.then(function (data) {
					if (!data || !data.path) {
						throw new Error('Invalid response');
					}
					soundPathInput.val(data.path);
					syncFieldTitles();
					setUploadStatus('ok', data.path);
					refreshPreview();
				})
				.catch(function (err) {
					var msg = err && err.message ? err.message : String(err);
					setUploadStatus('error', msg);
				})
				.finally(function () {
					fileInput.val('');
					uploadBtn.prop('disabled', false);
				});
		});

		refreshPreview();
	},
	oneditsave: function () {
		if (playaPreviewObjectUrl) {
			URL.revokeObjectURL(playaPreviewObjectUrl);
			playaPreviewObjectUrl = null;
		}
	},
	oneditcancel: function () {
		if (playaPreviewObjectUrl) {
			URL.revokeObjectURL(playaPreviewObjectUrl);
			playaPreviewObjectUrl = null;
		}
	},
	button: {
		onclick: function () {
			var node = this;
			var base = RED.httpAdminRoot || '';
			if (base.slice(-1) !== '/') {
				base += '/';
			}
			var headers = {
				Accept: 'application/json',
				'Content-Type': 'application/json'
			};
			if (RED.settings && RED.settings.csrfToken) {
				headers['X-CSRF-Token'] = RED.settings.csrfToken;
			}
			fetch(base + 'contrib-playa/stop/' + encodeURIComponent(node.id), {
				method: 'POST',
				credentials: 'include',
				headers: headers,
				body: '{}'
			})
				.then(function (res) {
					if (!res.ok) {
						return res.text().then(function (t) {
							var err = new Error(t || res.statusText);
							err.status = res.status;
							throw err;
						});
					}
					return res.json();
				})
				.then(function () {
					RED.notify(node._('playa.notify.stopOk'), { type: 'success', timeout: 2000 });
				})
				.catch(function (err) {
					var msg = err && err.message ? err.message : String(err);
					if (err && err.status === 404) {
						RED.notify(node._('playa.notify.stopNotDeployed'), { type: 'warning', timeout: 2500 });
					} else {
						RED.notify(node._('playa.notify.stopFailed') + ' ' + msg, 'error');
					}
				});
		}
	}
});
</script>

<script type="text/x-red" data-template-name="playa">
	<div class="form-row">
		<label for="node-input-name"><i class="icon-tag"></i> <span data-i18n="playa.label.name"></span></label>
		<input type="text" id="node-input-name" data-i18n="[placeholder]playa.placeholder.name" style="width:100%;box-sizing:border-box">
	</div>
	<div class="form-row">
		<label for="node-input-soundPath"><i class="icon-music"></i> <span data-i18n="playa.label.soundPath"></span></label>
		<input type="text" id="node-input-soundPath" data-i18n="[placeholder]playa.placeholder.soundPath" style="width:100%;box-sizing:border-box;font-family:monospace,monospace;font-size:12px">
	</div>
	<div class="form-row">
		<label style="display:block;width:100%;margin-bottom:6px;"><i class="icon-upload"></i> <span data-i18n="playa.label.upload"></span></label>
		<div style="display:flex;flex-wrap:wrap;align-items:flex-start;gap:10px;max-width:100%;">
			<button type="button" id="node-input-playa-upload-btn" class="editor-button" data-i18n="playa.label.uploadButton"></button>
			<input type="file" id="node-input-playa-file" accept=".wav,.mp3,.ogg,.flac,.m4a,.aac,audio/*" style="position:absolute;left:-9999px;width:1px;height:1px;opacity:0;" tabindex="-1" aria-hidden="true">
			<div id="node-input-playa-upload-status" class="form-tips" style="display:none;flex:1;min-width:180px;max-width:100%;line-height:1.35;margin:0;"></div>
		</div>
	</div>
	<div class="form-row">
		<label for="node-input-playa-preview-audio"><i class="icon-volume-up"></i> <span data-i18n="playa.label.preview"></span></label>
		<audio id="node-input-playa-preview-audio" controls preload="none" style="display:block;max-width:100%;width:min(400px,100%);height:36px"></audio>
		<div id="node-input-playa-preview-error" class="form-tips" style="display:none;margin-top:6px;color:#AD1625"></div>
	</div>
	<div class="form-row">
		<label for="node-input-player"><i class="icon-wrench"></i> <span data-i18n="playa.label.player"></span></label>
		<select type="text" id="node-input-player" style="width:100%;max-width:100%;box-sizing:border-box"></select>
	</div>
	<div class="form-row">
		<label for="node-input-stopPrevious" style="width: 100%; display: inline-flex; align-items: center; gap: 8px;">
			<input type="checkbox" id="node-input-stopPrevious" style="width: auto; margin: 0;">
			<span data-i18n="playa.label.stopPrevious"></span>
		</label>
	</div>
	<div class="form-row">
		<label for="node-input-sendOnEnd" style="width: 100%; display: inline-flex; align-items: center; gap: 8px;">
			<input type="checkbox" id="node-input-sendOnEnd" style="width: auto; margin: 0;">
			<span data-i18n="playa.label.sendOnEnd"></span>
		</label>
	</div>
</script>

<script type="text/x-red" data-help-name="playa">
<p>Plays an audio file using a command-line player on the host where Node-RED runs.</p>
<p>Playback path order: <code>msg.payload</code> (if non-empty), then <b>Sound file path</b> (typed or set by upload), then <b>Name</b>. <b>Name</b> is also the node label. Use <b>Choose file &amp; upload</b> for a visible upload control; status text shows progress and the saved path or an error. Uploads are stored under your Node-RED user directory in <code>node-red-contrib-play/uploads</code> (max. 10&nbsp;MB; extensions: wav, mp3, ogg, flac, m4a, aac). Flow exports do not include those binary files—back up that folder if needed.</p>
<p><b>Stop previous playback</b> (default on): before starting a new file, the node stops the still-running player process from the last trigger. Turn off to allow overlapping sounds.</p>
<p><b>Send output when playback finishes</b> (default off): when enabled, the message is sent after the player exits successfully; when off, the message is sent right after playback starts (same as earlier versions).</p>
<p>The <b>button</b> on the node edge (like Inject) calls the admin API to <b>stop the current playback</b> for this node on the runtime host. Deploy the flow first; requires editor access with permission to change flows.</p>
<p>Select <b>Player</b> for the CLI (for example <code>afplay</code> on macOS, <code>aplay</code> on many Linux systems).</p>
</script>
