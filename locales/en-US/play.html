<script type="text/x-red" data-help-name="playa">
<p>Plays an audio file using a command-line player on the host where Node-RED runs.</p>
<p>The <b>Name</b> field is used as a fallback path when <code>msg.payload</code> is missing or empty. Select <b>Player</b> for the CLI (for example <code>afplay</code> on macOS, <code>aplay</code> on many Linux systems).</p>
</script>
