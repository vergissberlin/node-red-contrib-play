<script type="text/x-red" data-help-name="playa">
<p>Spielt eine Audiodatei mit einem Kommandozeilen-Player auf dem Rechner ab, auf dem Node-RED läuft.</p>
<p>Reihenfolge des Wiedergabepfads: <code>msg.payload</code> (wenn nicht leer), dann <b>Pfad zur Sounddatei</b> (eingetippt oder per Upload), dann <b>Name</b>. <b>Name</b> ist außerdem die Knotenbeschriftung. Hochgeladene Dateien liegen im Node-RED-Benutzerverzeichnis unter <code>node-red-contrib-play/uploads</code> (max. 10&nbsp;MB; Endungen: wav, mp3, ogg, flac, m4a, aac). Flow-Exporte enthalten diese Binärdateien nicht—sichern Sie den Ordner bei Bedarf. Unter <b>Player</b> wählen Sie das CLI (z.&nbsp;B. <code>afplay</code> unter macOS, <code>aplay</code> unter vielen Linux-Systemen).</p>
</script>
