<script type="text/x-red" data-help-name="playa">
<p>Spielt eine Audiodatei mit einem Kommandozeilen-Player auf dem Rechner ab, auf dem Node-RED läuft.</p>
<p>Das Feld <b>Name</b> wird als Fallback-Pfad genutzt, wenn <code>msg.payload</code> fehlt oder leer ist. Unter <b>Player</b> wählen Sie das CLI-Programm (z.&nbsp;B. <code>afplay</code> unter macOS, <code>aplay</code> unter vielen Linux-Systemen).</p>
</script>
