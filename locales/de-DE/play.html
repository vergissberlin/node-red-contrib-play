<script type="text/x-red" data-help-name="playa">
<p>Spielt eine Audiodatei mit einem Kommandozeilen-Player auf dem Rechner ab, auf dem Node-RED läuft.</p>
<p>Reihenfolge des Wiedergabepfads: <code>msg.payload</code> (wenn nicht leer), dann <b>Pfad zur Sounddatei</b> (eingetippt oder per Upload), dann <b>Name</b>. <b>Name</b> ist außerdem die Knotenbeschriftung. Über <b>Datei wählen &amp; hochladen</b> starten Sie den Upload; der Status zeigt Fortschritt und den gespeicherten Pfad oder eine Fehlermeldung. Hochgeladene Dateien liegen im Node-RED-Benutzerverzeichnis unter <code>node-red-contrib-play/uploads</code> (max. 10&nbsp;MB; Endungen: wav, mp3, ogg, flac, m4a, aac). Flow-Exporte enthalten diese Binärdateien nicht—sichern Sie den Ordner bei Bedarf.</p>
<p><b>Vorherige Wiedergabe stoppen</b> (Standard: an): Bevor eine neue Datei startet, beendet der Knoten den noch laufenden Player-Prozess vom letzten Trigger. Deaktivieren Sie die Option, um mehrere Sounds gleichzeitig laufen zu lassen.</p>
<p><b>Ausgabe nach Ende der Wiedergabe senden</b> (Standard: aus): Wenn aktiviert, wird die Nachricht gesendet, sobald der Player erfolgreich beendet wurde; wenn aus, wird die Nachricht direkt nach dem Start der Wiedergabe gesendet (wie in früheren Versionen).</p>
<p>Unter <b>Player</b> wählen Sie das CLI (z.&nbsp;B. <code>afplay</code> unter macOS, <code>aplay</code> unter vielen Linux-Systemen).</p>
</script>
