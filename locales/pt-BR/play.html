<script type="text/x-red" data-help-name="playa">
<p>Reproduz um arquivo de áudio usando um player de linha de comando na máquina em que o Node-RED está em execução.</p>
<p>O campo <b>Nome</b> é usado como caminho alternativo quando <code>msg.payload</code> estiver ausente ou vazio. Selecione o <b>Reprodutor</b> da CLI (por exemplo <code>afplay</code> no macOS, <code>aplay</code> em muitos sistemas Linux).</p>
</script>
