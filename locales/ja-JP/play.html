<script type="text/x-red" data-help-name="playa">
<p>Node-RED を動かしているホスト上で、コマンドラインのプレーヤーを使って音声ファイルを再生します。</p>
<p>再生パスの優先順位: 空でない <code>msg.payload</code> → <b>音声ファイルのパス</b>（入力またはアップロードで設定）→ <b>名前</b>。<b>名前</b> はノードのラベルにもなります。アップロードしたファイルは Node-RED のユーザーディレクトリ内の <code>node-red-contrib-play/uploads</code> に保存されます（最大 10&nbsp;MB、拡張子: wav, mp3, ogg, flac, m4a, aac）。フローのエクスポートにはバイナリは含まれません。</p>
<p><b>前の再生を停止</b>（既定: オン）: 新しいファイルを開始する前に、直前のトリガーでまだ動いているプレーヤープロセスを停止します。オフにすると音を重ねて再生できます。</p>
<p><b>再生終了時に出力を送信</b>（既定: オフ）: オンにすると、プレーヤーが正常終了したあとにメッセージを送ります。オフにすると、再生開始直後に送ります（従来の動作）。</p>
<p lang="en">The <b>button</b> on the node edge (like Inject) calls the admin API to <b>stop the current playback</b> for this node on the runtime host. Deploy the flow first; requires editor access with permission to change flows.</p>
<p><b>プレーヤー</b> で CLI を選びます（例: macOS の <code>afplay</code>、多くの Linux の <code>aplay</code>）。</p>
</script>
