<script type="text/x-red" data-help-name="playa">
<p>Node-RED を動かしているホスト上で、コマンドラインのプレーヤーを使って音声ファイルを再生します。</p>
<p>再生パスの優先順位: 空でない <code>msg.payload</code> → <b>音声ファイルのパス</b>（入力またはアップロードで設定）→ <b>名前</b>。<b>名前</b> はノードのラベルにもなります。アップロードしたファイルは Node-RED のユーザーディレクトリ内の <code>node-red-contrib-play/uploads</code> に保存されます（最大 10&nbsp;MB、拡張子: wav, mp3, ogg, flac, m4a, aac）。フローのエクスポートにはバイナリは含まれません。<b>プレーヤー</b> で CLI を選びます（例: macOS の <code>afplay</code>、多くの Linux の <code>aplay</code>）。</p>
</script>
