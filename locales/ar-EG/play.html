<script type="text/x-red" data-help-name="playa">
<p>يشغّل ملف صوتي عبر مشغّل سطر الأوامر على الجهاز الذي يعمل عليه Node-RED.</p>
<p>يُستخدم حقل <b>الاسم</b> كمسار احتياطي عندما يكون <code>msg.payload</code> فارغًا أو غير موجود. اختر <b>المشغّل</b> لأداة سطر الأوامر (مثل <code>afplay</code> على macOS و<code>aplay</code> على كثير من أنظمة Linux).</p>
</script>
