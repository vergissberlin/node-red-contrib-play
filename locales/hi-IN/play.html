<script type="text/x-red" data-help-name="playa">
<p>Node-RED चलने वाली मशीन पर कमांड-लाइन प्लेयर से ऑडियो फ़ाइल चलाता है।</p>
<p>प्लेबैक पथ का क्रम: खाली न होने पर <code>msg.payload</code>, फिर <b>साउंड फ़ाइल का पथ</b> (टाइप या अपलोड से), फिर <b>नाम</b>। <b>नाम</b> नोड लेबल भी है। अपलोड की गई फ़ाइलें Node-RED उपयोगकर्ता डायरेक्टरी में <code>node-red-contrib-play/uploads</code> पर सहेजी जाती हैं (अधिकतम 10&nbsp;MB; एक्सटेंशन: wav, mp3, ogg, flac, m4a, aac)। फ़्लो निर्यात में ये बाइनरी शामिल नहीं होतीं।</p>
<p lang="en"><b>Stop previous playback</b> (default on): before starting a new file, the node stops the still-running player process from the last trigger. Turn off to allow overlapping sounds.</p>
<p lang="en"><b>Send output when playback finishes</b> (default off): when enabled, the message is sent after the player exits successfully; when off, the message is sent right after playback starts (same as earlier versions).</p>
<p lang="en">The <b>button</b> on the node edge (like Inject) calls the admin API to <b>stop the current playback</b> for this node on the runtime host. Deploy the flow first; requires editor access with permission to change flows.</p>
<p><b>प्लेयर</b> में CLI चुनें (उदाहरण: macOS पर <code>afplay</code>, कई Linux पर <code>aplay</code>)।</p>
</script>
