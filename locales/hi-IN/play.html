<script type="text/x-red" data-help-name="playa">
<p>Node-RED चलने वाली मशीन पर कमांड-लाइन प्लेयर से ऑडियो फ़ाइल चलाता है।</p>
<p>जब <code>msg.payload</code> खाली या न हो, तब <b>नाम</b> फ़ील्ड फ़ॉलबैक पथ के रूप में उपयोग होता है। <b>प्लेयर</b> में CLI चुनें (उदाहरण: macOS पर <code>afplay</code>, कई Linux पर <code>aplay</code>)।</p>
</script>
