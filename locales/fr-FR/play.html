<script type="text/x-red" data-help-name="playa">
<p>Lit un fichier audio via un lecteur en ligne de commande sur la machine qui exécute Node-RED.</p>
<p>Le champ <b>Nom</b> sert de chemin de repli lorsque <code>msg.payload</code> est absent ou vide. Choisissez le <b>Lecteur</b> CLI (par ex. <code>afplay</code> sur macOS, <code>aplay</code> sur de nombreux systèmes Linux).</p>
</script>
