<script type="text/x-red" data-help-name="playa">
<p>Lit un fichier audio via un lecteur en ligne de commande sur la machine qui exécute Node-RED.</p>
<p>Ordre du chemin de lecture&nbsp;: <code>msg.payload</code> (s’il n’est pas vide), puis <b>Chemin du fichier audio</b> (saisi ou défini par téléversement), puis <b>Nom</b>. <b>Nom</b> est aussi l’étiquette du nœud. Les fichiers téléversés sont stockés dans le répertoire utilisateur Node-RED sous <code>node-red-contrib-play/uploads</code> (max. 10&nbsp;Mo&nbsp;; extensions&nbsp;: wav, mp3, ogg, flac, m4a, aac). Les exports de flux n’incluent pas ces fichiers binaires.</p>
<p><b>Arrêter la lecture précédente</b> (activé par défaut)&nbsp;: avant de lancer un nouveau fichier, le nœud arrête le processus lecteur encore actif du dernier déclenchement. Désactivez pour autoriser des sons superposés.</p>
<p><b>Envoyer la sortie à la fin de la lecture</b> (désactivé par défaut)&nbsp;: si activé, le message est envoyé après la fin correcte du lecteur&nbsp;; sinon, le message est envoyé juste après le début de la lecture (comme les versions précédentes).</p>
<p>Choisissez le <b>Lecteur</b> CLI (par ex. <code>afplay</code> sur macOS, <code>aplay</code> sur de nombreux systèmes Linux).</p>
</script>
