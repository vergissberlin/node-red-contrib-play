<script type="text/x-red" data-help-name="playa">
<p>Воспроизводит аудиофайл через консольный проигрыватель на компьютере, где запущен Node-RED.</p>
<p>Порядок пути воспроизведения: <code>msg.payload</code> (если непустой), затем <b>Путь к аудиофайлу</b> (введённый или после загрузки), затем <b>Имя</b>. <b>Имя</b> также служит подписью узла. Загруженные файлы сохраняются в каталоге пользователя Node-RED: <code>node-red-contrib-play/uploads</code> (макс. 10&nbsp;МБ; расширения: wav, mp3, ogg, flac, m4a, aac). Экспорт потоков не включает эти двоичные файлы.</p>
<p><b>Остановить предыдущее воспроизведение</b> (по умолчанию: вкл.): перед запуском нового файла узел завершает ещё работающий процесс плеера от предыдущего срабатывания. Отключите, чтобы разрешить наложение звуков.</p>
<p><b>Отправлять выход по окончании воспроизведения</b> (по умолчанию: выкл.): если включено, сообщение отправляется после успешного завершения плеера; если выкл. — сразу после начала воспроизведения (как в ранних версиях).</p>
<p lang="en">The <b>button</b> on the node edge (like Inject) calls the admin API to <b>stop the current playback</b> for this node on the runtime host. Deploy the flow first; requires editor access with permission to change flows.</p>
<p>В <b>Проигрыватель</b> выберите CLI (например <code>afplay</code> в macOS, <code>aplay</code> во многих дистрибутивах Linux).</p>
</script>
