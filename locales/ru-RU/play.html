<script type="text/x-red" data-help-name="playa">
<p>Воспроизводит аудиофайл через консольный проигрыватель на компьютере, где запущен Node-RED.</p>
<p>Поле <b>Имя</b> используется как запасной путь, если <code>msg.payload</code> отсутствует или пуст. В <b>Проигрыватель</b> выберите CLI (например <code>afplay</code> в macOS, <code>aplay</code> во многих дистрибутивах Linux).</p>
</script>
