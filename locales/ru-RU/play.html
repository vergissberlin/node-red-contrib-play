<script type="text/x-red" data-help-name="playa">
<p>Воспроизводит аудиофайл через консольный проигрыватель на компьютере, где запущен Node-RED.</p>
<p>Порядок пути воспроизведения: <code>msg.payload</code> (если непустой), затем <b>Путь к аудиофайлу</b> (введённый или после загрузки), затем <b>Имя</b>. <b>Имя</b> также служит подписью узла. Загруженные файлы сохраняются в каталоге пользователя Node-RED: <code>node-red-contrib-play/uploads</code> (макс. 10&nbsp;МБ; расширения: wav, mp3, ogg, flac, m4a, aac). Экспорт потоков не включает эти двоичные файлы. В <b>Проигрыватель</b> выберите CLI (например <code>afplay</code> в macOS, <code>aplay</code> во многих дистрибутивах Linux).</p>
</script>
