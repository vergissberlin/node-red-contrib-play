<script type="text/x-red" data-help-name="playa">
<p>Reproduce un archivo de audio mediante un reproductor de línea de comandos en el equipo donde se ejecuta Node-RED.</p>
<p>El campo <b>Nombre</b> se usa como ruta alternativa si falta o está vacío <code>msg.payload</code>. Elija el <b>Reproductor</b> de la CLI (por ejemplo <code>afplay</code> en macOS, <code>aplay</code> en muchos Linux).</p>
</script>
