<script type="text/x-red" data-help-name="playa">
<p>Reproduce un archivo de audio mediante un reproductor de línea de comandos en el equipo donde se ejecuta Node-RED.</p>
<p>Orden de la ruta de reproducción: <code>msg.payload</code> (si no está vacío), luego <b>Ruta del archivo de audio</b> (escrita o por subida), después <b>Nombre</b>. <b>Nombre</b> también es la etiqueta del nodo. Las subidas se guardan en el directorio de usuario de Node-RED en <code>node-red-contrib-play/uploads</code> (máx. 10&nbsp;MB; extensiones: wav, mp3, ogg, flac, m4a, aac). Las exportaciones de flujo no incluyen esos binarios. Elija el <b>Reproductor</b> de la CLI (por ejemplo <code>afplay</code> en macOS, <code>aplay</code> en muchos Linux).</p>
</script>
